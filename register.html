<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - NextHire</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="logo">Next<span>Hire</span></div>

    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>

    <nav id="navMenu" class="nav">
      <a href="index.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="login.html" class="auth-link">Login</a>

      <div id="userSection" class="user-section"></div>
    </nav>
  </header>

  <div class="nav-overlay" id="navOverlay"></div>

  <main>
    <section class="form-section">
      <div class="form-box">
        <h2>Create Account</h2>
        <p class="form-subtitle">Join to start applying for jobs today.</p>

        <form onsubmit="event.preventDefault(); registerUser();">
          <div class="form-field">
            <input type="text" id="name" placeholder=" " required>
            <label for="name">Full Name</label>
            <span class="field-hint">Name is required</span>
          </div>

          <div class="form-field">
            <input type="email" id="email" placeholder=" " required>
            <label for="email">Email Address</label>
            <span class="field-hint">Enter a valid email address</span>
          </div>

          <div class="form-field password-box">
            <input type="password" id="password" placeholder=" " required minlength="6">
            <label for="password">Password</label>
            <span onclick="togglePassword()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();togglePassword();}" class="eye" role="button" tabindex="0" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
            <span class="field-hint">Minimum 6 characters</span>
          </div>

          <div class="form-field static">
            <label for="role">Role</label>
            <select id="role" required>
              <option value="">Select Role</option>
              <option>Job Seeker</option>
              <option>Employer</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Register</button>

          <p id="registerMsg" class="form-msg"></p>
          <p>Already have an account? <a href="login.html">Login</a></p>
        </form>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>

  <script>
    async function registerUser() {
      let msgEl = document.getElementById("registerMsg");
      msgEl.textContent = "";
      msgEl.className = "form-msg";

      try {
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;
        let role = document.getElementById("role").value;

        let response = await fetch("/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, email, password, role })
        });

        let data = await response.json();

        msgEl.textContent = data.message;
        msgEl.className = data.message === "User Registered Successfully" ? "form-msg success" : "form-msg error";

        if (data.message === "User Registered Successfully") {
          setTimeout(() => window.location.href = "login.html", 700);
        }

      } catch (error) {
        console.error(error);
        msgEl.textContent = "Registration failed. Check console.";
        msgEl.className = "form-msg error";
      }
    }
  </script>

</body>
</html>
